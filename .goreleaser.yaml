# GoReleaser configuration for loope.
# Local dry run:  goreleaser release --snapshot --clean
# Real release:   git tag v0.1.0 && git push origin v0.1.0  (CI does the rest)
version: 2

project_name: loope

before:
  hooks:
    - go mod tidy

builds:
  - id: loope
    main: .
    binary: loope
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: loope
    # Predictable lowercase names so install.sh can construct the URL directly:
    #   loope_darwin_arm64.tar.gz, loope_linux_amd64.tar.gz, ...
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - loope.json.example
      - persona.example.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
