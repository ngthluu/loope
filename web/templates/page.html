{{define "page"}}<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>loop // telemetry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js"></script>
<script src="/static/idiomorph-ext.min.js"></script>
</head>
<body class="font-sans text-text antialiased" hx-ext="morph">
<div class="flex h-screen flex-col">
 <header class="flex shrink-0 items-center justify-between gap-4 border-b border-line bg-panel px-5 py-3">
  <div class="flex items-center gap-3 min-w-0">
   <div class="flex items-center gap-2">
    <span class="relative flex h-2.5 w-2.5"><span class="ring absolute inline-flex h-2.5 w-2.5 rounded-full"></span><span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-live"></span></span>
    <span class="font-mono text-[15px] font-semibold tracking-tight text-text">loop<span class="text-live">·</span>telemetry</span>
   </div>
   <span class="hidden truncate font-mono text-xs text-faint sm:inline">reading {{.Stats.Tickets}} tracked issues</span>
  </div>
  <div id="statbar" class="flex items-center gap-4 font-mono text-xs sm:gap-5">{{template "statbar" .}}</div>
 </header>
 <div class="flex min-h-0 flex-1">
  <nav id="rail" class="scroll w-[320px] shrink-0 overflow-y-auto border-r border-line bg-panel"
       hx-get="/rail?issue={{if .Selected}}{{.Selected.Number}}{{end}}" hx-trigger="every 3s" hx-swap="morph:innerHTML">{{template "rail" .}}</nav>
  <main id="main" class="scroll min-w-0 flex-1 overflow-y-auto"
        hx-get="/detail?issue={{if .Selected}}{{.Selected.Number}}{{end}}" hx-trigger="every 3s" hx-swap="morph:innerHTML">{{template "detail" .}}</main>
 </div>
</div>
<script src="/static/app.js"></script>
</body></html>{{end}}
